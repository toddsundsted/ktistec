name: ktistec
version: 3.6.0

description: |
  Ktistec is an ActivityPub server for individual users and small groups.

authors:
  - Todd Sundsted <todd@sundsted.com>

targets:
  ktistec:
    main: src/ktistec/server.cr

dependencies:
  kemal:
    github: kemalcr/kemal
    version: ~> 1.7.0
  sqlite3:
    github: crystal-lang/crystal-sqlite3
    version: ~> 0.20
  libxml_ext:
    github: toddsundsted/libxml_ext
    version: ~> 0.2.0
  markd:
    github: icyleaf/markd
    version: ~> 0.5.0

development_dependencies:
  spectator:
    gitlab: arctic-fox/spectator
    version: ~> 0.12.0
  ameba:
    github: crystal-ameba/ameba
    version: ~> 1.6.0

crystal: 1.19.1

libraries:
  libsqlite3: ">= 3.11.0"

license: AGPL-3.0-only
