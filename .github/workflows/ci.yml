on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        crystal: [1.19.1]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download source
        uses: actions/checkout@v4
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal }}
      - name: Install libraries
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
               brew install libxml2
          elif [ "$RUNNER_OS" == "Linux" ]; then
               # See: https://github.com/crystal-lang/crystal/issues/7177
               sudo apt update && sudo apt install -y lld
          fi
        shell: bash
      - name: Cache shards
        uses: actions/cache@v4
        with:
          path: lib
          key: shards-${{ runner.os }}-${{ hashFiles('shard.lock') }}
          restore-keys: |
            shards-${{ runner.os }}-
      - name: Install shards
        run: shards install
      - name: Run tests
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
               PKG_CONFIG_PATH="$PKG_CONFIG_PATH:/usr/local/opt/libxml2/lib/pkgconfig" crystal spec
          elif [ "$RUNNER_OS" == "Linux" ]; then
               # Run in batches of 25 to avoid some build memory/time limit that causes the suite set to be canceled.
               find spec -name "*_spec.cr" -print0 | xargs -0 -n 25 crystal spec --link-flags="-fuse-ld=lld"
          fi
        env:
          LOG_LEVEL: NONE
      - name: Build
        run: shards build
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-${{ runner.os }}-
      - name: Install npm dependencies
        run: npm ci
      - name: Audit npm dependencies
        run: npm audit
      - name: Run npm tests
        run: npm run test
